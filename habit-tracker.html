<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Habit Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #d8d6cc;
    --border-light: #e8e6de;
    --text: #1a1a18;
    --text-muted: #888780;
    --text-faint: #b4b2a9;
    --today-bg: rgba(55,138,221,0.07);
    --today-border: #378add;
    --header-bg: #f1efe8;
    --modal-overlay: rgba(0,0,0,0.4);
    --radius: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #242422;
      --border: #3a3a36;
      --border-light: #2e2e2a;
      --text: #e8e6de;
      --text-muted: #888780;
      --text-faint: #555450;
      --today-bg: rgba(55,138,221,0.1);
      --header-bg: #1e1e1c;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
    color: var(--text);
  }

  .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 20px;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .month-nav { display: flex; align-items: center; gap: 10px; }

  .month-nav button {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 15px;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .month-nav button:hover { background: var(--header-bg); }

  .month-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    min-width: 150px;
    text-align: center;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .top-right { display: flex; gap: 8px; }

  .btn {
    font-size: 11px;
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: none;
    cursor: pointer;
    color: var(--text);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--header-bg); }
  .btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { color: #c0392b; border-color: #c0392b; }
  .btn.danger:hover { background: rgba(192,57,43,0.08); }

  .grid-wrap { overflow-x: auto; padding-bottom: 8px; }

  table {
    border-collapse: collapse;
    min-width: 100%;
  }

  th, td {
    border: 1px solid var(--border-light);
    text-align: center;
    user-select: none;
  }

  .habit-col { width: 140px; min-width: 120px; }
  .day-col   { width: 27px;  min-width: 22px;  }
  .sum-col   { width: 44px; }

  thead th {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    padding: 5px 2px;
    background: var(--header-bg);
    text-transform: uppercase;
  }

  .habit-name-cell {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
    padding: 0 8px;
    height: 34px;
    text-align: left !important;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    background: var(--surface);
  }
  .habit-name-cell:hover { opacity: 0.75; }

  .habit-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .check-cell {
    height: 34px;
    cursor: pointer;
    background: var(--surface);
    transition: background 0.08s;
    position: relative;
  }
  .check-cell:hover { filter: brightness(0.93); }
  .check-cell.today-col { background: var(--today-bg); border-color: rgba(55,138,221,0.25) !important; }
  .check-cell.done { }

  .sum-cell {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 2px 3px;
    background: var(--header-bg);
    line-height: 1.5;
  }

  .streak-section {
    margin-top: 20px;
    border-top: 1px solid var(--border-light);
    padding-top: 14px;
  }

  .streak-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }

  .streak-pills { display: flex; flex-wrap: wrap; gap: 8px; }

  .streak-pill {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    padding: 4px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
  }

  .legend {
    margin-top: 16px;
    display: flex; gap: 18px; flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; color: var(--text-faint);
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .legend-box {
    width: 13px; height: 13px;
    border-radius: 2px;
    border: 1px solid var(--border);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--modal-overlay);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 300px;
    font-family: 'Courier New', monospace;
  }

  .modal h3 {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    color: var(--text);
  }

  .modal label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 5px;
  }

  .modal input[type="text"] {
    width: 100%;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    margin-bottom: 14px;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .modal input[type="text"]:focus { border-color: var(--text-muted); }

  .color-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }

  .color-swatch {
    width: 24px; height: 24px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.1); }

  .modal-btns {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 4px;
  }

  /* Progress summary bar */
  .summary-row {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 10px 16px;
    min-width: 90px;
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
  }
  .stat-desc {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  @media (max-width: 500px) {
    body { padding: 16px 8px 60px; }
    .habit-col { width: 100px; min-width: 90px; }
    .day-col { width: 22px; min-width: 18px; }
    thead th { font-size: 8px; }
  }
</style>
</head>
<body>

<h1>Habit Tracker</h1>
<p class="subtitle">click a cell to mark done &mdash; click habit name to edit</p>

<div class="summary-row" id="summary-row"></div>

<div class="top-bar">
  <div class="month-nav">
    <button id="prev-btn">&#8592;</button>
    <span class="month-label" id="month-label"></span>
    <button id="next-btn">&#8594;</button>
  </div>
  <div class="top-right">
    <button class="btn" id="add-btn">+ add habit</button>
  </div>
</div>

<div class="grid-wrap">
  <table id="habit-table"></table>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-box" style="background:var(--header-bg);"></div>empty
  </div>
  <div class="legend-item">
    <div class="legend-box" style="background:#4a9d6f; border-color:#4a9d6f;"></div>done
  </div>
  <div class="legend-item">
    <div class="legend-box" style="background:var(--today-bg); border-color:rgba(55,138,221,0.4);"></div>today
  </div>
</div>

<div class="streak-section">
  <div class="streak-label">current streaks (this month)</div>
  <div class="streak-pills" id="streak-pills"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">new habit</h3>
    <label>habit name</label>
    <input type="text" id="habit-input" placeholder="e.g. meditate, read, leetcode..." maxlength="30" />
    <label>color</label>
    <div class="color-row" id="color-row"></div>
    <div class="modal-btns">
      <button class="btn danger" id="delete-btn" style="display:none;">delete</button>
      <button class="btn" id="cancel-btn">cancel</button>
      <button class="btn primary" id="save-btn">save</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  '#4a9d6f','#378add','#c0392b','#e67e22',
  '#8e44ad','#d4a017','#1abc9c','#e91e8c',
  '#2c3e50','#16a085'
];

const STORAGE_HABITS = 'ht2_habits';
const STORAGE_DATA   = 'ht2_data';

let habits = JSON.parse(localStorage.getItem(STORAGE_HABITS) || 'null');
let data   = JSON.parse(localStorage.getItem(STORAGE_DATA)   || '{}');

if (!habits) {
  habits = [
    { id: uid(), name: 'Wake up 6am',   color: 0 },
    { id: uid(), name: 'DSA / Leetcode', color: 1 },
    { id: uid(), name: 'Read 30 min',   color: 4 },
    { id: uid(), name: 'No junk food',  color: 2 },
    { id: uid(), name: 'Exercise',      color: 6 },
  ];
}

const now = new Date();
let viewYear  = now.getFullYear();
let viewMonth = now.getMonth();

function uid() { return 'h' + Math.random().toString(36).slice(2,9); }
function save() {
  localStorage.setItem(STORAGE_HABITS, JSON.stringify(habits));
  localStorage.setItem(STORAGE_DATA,   JSON.stringify(data));
}
function cellKey(hid, y, m, d) { return hid+'_'+y+'_'+m+'_'+d; }
function daysInMonth(y, m)    { return new Date(y, m+1, 0).getDate(); }
function monthName(m) {
  return ['January','February','March','April','May','June',
          'July','August','September','October','November','December'][m];
}
function dayLetter(y, m, d) { return 'SMTWTFS'[new Date(y,m,d).getDay()]; }

function render() {
  document.getElementById('month-label').textContent =
    monthName(viewMonth).toUpperCase() + ' ' + viewYear;

  const days   = daysInMonth(viewYear, viewMonth);
  const todayD = (viewYear === now.getFullYear() && viewMonth === now.getMonth())
                  ? now.getDate() : -1;

  // Summary cards
  let totalCells = 0, doneCells = 0;
  habits.forEach(h => {
    for (let d = 1; d <= days; d++) {
      totalCells++;
      if (data[cellKey(h.id, viewYear, viewMonth, d)]) doneCells++;
    }
  });
  const overallPct = totalCells ? Math.round((doneCells/totalCells)*100) : 0;
  document.getElementById('summary-row').innerHTML =
    statCard(habits.length, 'habits') +
    statCard(days, 'days') +
    statCard(doneCells, 'checked') +
    statCard(overallPct + '%', 'overall');

  // Table
  const table = document.getElementById('habit-table');
  table.innerHTML = '';

  // thead
  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');

  const hth = document.createElement('th');
  hth.className = 'habit-col';
  hth.textContent = 'HABIT';
  hrow.appendChild(hth);

  for (let d = 1; d <= days; d++) {
    const th = document.createElement('th');
    th.className = 'day-col';
    th.innerHTML = d + '<br><span style="font-size:7px;opacity:0.55;">' + dayLetter(viewYear, viewMonth, d) + '</span>';
    if (d === todayD) {
      th.style.color = '#378add';
      th.style.fontWeight = '700';
    }
    hrow.appendChild(th);
  }

  const sumTh = document.createElement('th');
  sumTh.className = 'sum-col';
  sumTh.textContent = 'DONE';
  hrow.appendChild(sumTh);
  thead.appendChild(hrow);
  table.appendChild(thead);

  // tbody
  const tbody = document.createElement('tbody');
  habits.forEach(h => {
    const color = COLORS[h.color] || COLORS[0];
    const tr = document.createElement('tr');

    // Name cell
    const nameTd = document.createElement('td');
    nameTd.className = 'habit-name-cell';
    nameTd.title = 'click to edit';
    nameTd.innerHTML = '<span class="habit-dot" style="background:'+color+'"></span>' + escHtml(h.name);
    nameTd.addEventListener('click', () => openModal(h.id));
    tr.appendChild(nameTd);

    // Day cells
    let count = 0;
    for (let d = 1; d <= days; d++) {
      const k    = cellKey(h.id, viewYear, viewMonth, d);
      const done = !!data[k];
      if (done) count++;

      const td = document.createElement('td');
      td.className = 'check-cell' + (d === todayD ? ' today-col' : '') + (done ? ' done' : '');
      td.style.background = done ? color : '';
      if (done && d === todayD) td.style.background = color; // override today tint

      td.addEventListener('click', () => {
        data[k] = !data[k];
        if (!data[k]) delete data[k];
        save();
        render();
      });
      tr.appendChild(td);
    }

    // Sum cell
    const pct   = Math.round((count / days) * 100);
    const sumTd = document.createElement('td');
    sumTd.className = 'sum-cell';
    sumTd.innerHTML = count + '<br><span style="font-size:8px;color:'+color+';">'+pct+'%</span>';
    tr.appendChild(sumTd);

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  renderStreaks();
}

function statCard(val, label) {
  return '<div class="stat-card"><div class="stat-num">'+val+'</div><div class="stat-desc">'+label+'</div></div>';
}

function renderStreaks() {
  const container = document.getElementById('streak-pills');
  container.innerHTML = '';
  const days = daysInMonth(viewYear, viewMonth);
  const todayD = (viewYear === now.getFullYear() && viewMonth === now.getMonth())
                  ? now.getDate() : days;
  habits.forEach(h => {
    let streak = 0;
    for (let d = todayD; d >= 1; d--) {
      if (data[cellKey(h.id, viewYear, viewMonth, d)]) streak++;
      else break;
    }
    const color = COLORS[h.color] || COLORS[0];
    const pill = document.createElement('div');
    pill.className = 'streak-pill';
    pill.innerHTML =
      '<span style="width:8px;height:8px;border-radius:50%;background:'+color+';display:inline-block;flex-shrink:0;"></span>' +
      escHtml(h.name) + ' &mdash; <strong>' + streak + '</strong> day' + (streak === 1 ? '' : 's');
    container.appendChild(pill);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ---- Modal ---- */
let editingId     = null;
let selectedColor = 0;

function buildColorRow() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  COLORS.forEach((c, i) => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (i === selectedColor ? ' selected' : '');
    s.style.background = c;
    s.addEventListener('click', () => { selectedColor = i; buildColorRow(); });
    row.appendChild(s);
  });
}

function openModal(id) {
  editingId = id || null;
  const input = document.getElementById('habit-input');
  const del   = document.getElementById('delete-btn');
  const title = document.getElementById('modal-title');

  if (id) {
    const h = habits.find(x => x.id === id);
    input.value   = h.name;
    selectedColor = h.color;
    del.style.display = 'inline-block';
    title.textContent = 'edit habit';
  } else {
    input.value   = '';
    selectedColor = habits.length % COLORS.length;
    del.style.display = 'none';
    title.textContent = 'new habit';
  }
  buildColorRow();
  document.getElementById('modal').classList.add('open');
  setTimeout(() => input.focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

document.getElementById('add-btn').addEventListener('click', () => openModal(null));
document.getElementById('cancel-btn').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.getElementById('save-btn').addEventListener('click', () => {
  const name = document.getElementById('habit-input').value.trim();
  if (!name) { document.getElementById('habit-input').focus(); return; }
  if (editingId) {
    const h = habits.find(x => x.id === editingId);
    h.name  = name;
    h.color = selectedColor;
  } else {
    habits.push({ id: uid(), name, color: selectedColor });
  }
  save(); closeModal(); render();
});

document.getElementById('delete-btn').addEventListener('click', () => {
  if (!editingId) return;
  if (!confirm('Delete this habit? All its data will be removed.')) return;
  habits = habits.filter(x => x.id !== editingId);
  Object.keys(data).forEach(k => { if (k.startsWith(editingId + '_')) delete data[k]; });
  save(); closeModal(); render();
});

document.getElementById('prev-btn').addEventListener('click', () => {
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render();
});
document.getElementById('next-btn').addEventListener('click', () => {
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render();
});

document.getElementById('habit-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('save-btn').click();
  if (e.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
